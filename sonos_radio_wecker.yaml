blueprint:
  name: Sonos Wecker (Zeitplan + Einmalig, sanfte Lautstärkesteigerung)
  description: >
    Spielt einen Radiosender auf einem Sonos-Lautsprecher ab, entweder gesteuert
    über einen Schedule-Helper (wiederkehrender Wochenplan) oder über eine
    einmalige Uhrzeit. Die Lautstärke steigt dabei schrittweise von einer
    Start- bis zu einer Maximal-Lautstärke an. Beide Wege lassen sich separat
    per Schalter aktivieren/deaktivieren. Der einmalige Wecker deaktiviert
    sich nach dem Auslösen automatisch wieder.
  domain: automation
  input:
    media_player_target:
      name: Sonos Lautsprecher
      selector:
        target:
          entity:
            domain: media_player

    radio_uri:
      name: Radio Stream URI
      description: >
        Stream-URL des Radiosenders. Wenn leer gelassen, wird ANTENNE BAYERN
        als Standard verwendet.
      default: "https://s6-webradio.antenne.de/antenne/stream/mp3?aw_0_1st.playerid=tunein.com"
      selector:
        text:

    volume_start:
      name: Start-Lautstärke
      description: Lautstärke, mit der der Wecker beginnt.
      default: 0.1
      selector:
        number:
          min: 0
          max: 1
          step: 0.05

    volume_max:
      name: Maximale Lautstärke
      description: Lautstärke, bis zu der schrittweise gesteigert wird.
      default: 0.4
      selector:
        number:
          min: 0
          max: 1
          step: 0.05

    volume_ramp_minutes:
      name: Dauer der Lautstärkesteigerung (Minuten)
      default: 5
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: min

    volume_steps:
      name: Anzahl der Lautstärke-Schritte
      default: 8
      selector:
        number:
          min: 2
          max: 20

    schedule_entity:
      name: Zeitplan (Schedule Helper)
      description: Unter Einstellungen -> Helfer -> Zeitplan angelegt
      selector:
        entity:
          domain: schedule

    schedule_enabled:
      name: Schalter "Wochenplan aktiv"
      selector:
        entity:
          domain: input_boolean

    override_datetime:
      name: Einmaliger Wecker (Datum/Uhrzeit)
      selector:
        entity:
          domain: input_datetime

    override_enabled:
      name: Schalter "Einmaliger Wecker aktiv"
      selector:
        entity:
          domain: input_boolean

trigger:
  - platform: state
    entity_id: !input schedule_entity
    to: "on"
    id: schedule
  - platform: time
    at: !input override_datetime
    id: override

condition: []

variables:
  vol_start: !input volume_start
  vol_max: !input volume_max
  vol_steps: !input volume_steps
  ramp_minutes: !input volume_ramp_minutes

action:
  - choose:
      - conditions:
          - condition: trigger
            id: schedule
          - condition: state
            entity_id: !input schedule_enabled
            state: "on"
        sequence:
          - service: media_player.volume_set
            target: !input media_player_target
            data:
              volume_level: "{{ vol_start }}"
          - service: media_player.play_media
            target: !input media_player_target
            data:
              media_content_id: !input radio_uri
              media_content_type: music
          - repeat:
              count: !input volume_steps
              sequence:
                - delay:
                    seconds: "{{ (ramp_minutes * 60 / vol_steps) | round(0) }}"
                - service: media_player.volume_set
                  target: !input media_player_target
                  data:
                    volume_level: "{{ (vol_start + (vol_max - vol_start) * repeat.index / vol_steps) | round(2) }}"

      - conditions:
          - condition: trigger
            id: override
          - condition: state
            entity_id: !input override_enabled
            state: "on"
        sequence:
          - service: media_player.volume_set
            target: !input media_player_target
            data:
              volume_level: "{{ vol_start }}"
          - service: media_player.play_media
            target: !input media_player_target
            data:
              media_content_id: !input radio_uri
              media_content_type: music
          - repeat:
              count: !input volume_steps
              sequence:
                - delay:
                    seconds: "{{ (ramp_minutes * 60 / vol_steps) | round(0) }}"
                - service: media_player.volume_set
                  target: !input media_player_target
                  data:
                    volume_level: "{{ (vol_start + (vol_max - vol_start) * repeat.index / vol_steps) | round(2) }}"
          - service: input_boolean.turn_off
            target:
              entity_id: !input override_enabled

mode: single
