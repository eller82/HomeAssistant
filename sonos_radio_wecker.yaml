blueprint:
  name: Sonos Wecker (Zeitplan + Einmalig)
  description: >
    Spielt einen Radiosender auf einem Sonos-Lautsprecher ab, entweder gesteuert
    über einen Schedule-Helper (wiederkehrender Wochenplan) oder über eine
    einmalige Uhrzeit. Beide Wege lassen sich separat per Schalter aktivieren/
    deaktivieren. Der einmalige Wecker deaktiviert sich nach dem Auslösen
    automatisch wieder.
  domain: automation
  input:
    media_player_target:
      name: Sonos Lautsprecher
      selector:
        target:
          entity:
            domain: media_player

    radio_uri:
      name: Radio Stream URI
      description: z.B. x-rincon-mp3radio://<stream-url> für ANTENNE BAYERN
      selector:
        text:

    volume_level:
      name: Lautstärke
      default: 0.3
      selector:
        number:
          min: 0
          max: 1
          step: 0.05

    schedule_entity:
      name: Zeitplan (Schedule Helper)
      description: Unter Einstellungen -> Helfer -> Zeitplan angelegt
      selector:
        entity:
          domain: schedule

    schedule_enabled:
      name: Schalter "Wochenplan aktiv"
      selector:
        entity:
          domain: input_boolean

    override_datetime:
      name: Einmaliger Wecker (Datum/Uhrzeit)
      selector:
        entity:
          domain: input_datetime

    override_enabled:
      name: Schalter "Einmaliger Wecker aktiv"
      selector:
        entity:
          domain: input_boolean

trigger:
  - platform: state
    entity_id: !input schedule_entity
    to: "on"
    id: schedule
  - platform: time
    at: !input override_datetime
    id: override

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: schedule
          - condition: state
            entity_id: !input schedule_enabled
            state: "on"
        sequence:
          - service: media_player.volume_set
            target: !input media_player_target
            data:
              volume_level: !input volume_level
          - service: media_player.play_media
            target: !input media_player_target
            data:
              media_content_id: !input radio_uri
              media_content_type: music

      - conditions:
          - condition: trigger
            id: override
          - condition: state
            entity_id: !input override_enabled
            state: "on"
        sequence:
          - service: media_player.volume_set
            target: !input media_player_target
            data:
              volume_level: !input volume_level
          - service: media_player.play_media
            target: !input media_player_target
            data:
              media_content_id: !input radio_uri
              media_content_type: music
          - service: input_boolean.turn_off
            target:
              entity_id: !input override_enabled

mode: single
